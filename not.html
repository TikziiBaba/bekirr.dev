</table>

<button onclick="hesapla()">HESAPLA</button>

<h3>🎯 Genel Ortalama: <span id="genel">0</span></h3>

<script>
function num(v){
  return parseFloat(String(v).replace(",", "."));
}

function hesapla(){
  let toplam=0;
  let saatToplam=0;

  document.querySelectorAll("tr").forEach(r=>{
    let inp=r.querySelectorAll("input");
    let ort=r.querySelector(".ort");
    let saat=r.querySelector(".saat");

    if(!inp.length) return;

    let toplamNot=0;
    let notSayisi=0;

    inp.forEach(i=>{
      let v=i.value.trim();

      if(v!==""){
        let n=num(v);

        if(!isNaN(n)){
          toplamNot+=n;
          notSayisi++;
        }
      }
    });

    let dersOrt = notSayisi>0 ? toplamNot/notSayisi : 0;

    ort.innerText=dersOrt.toFixed(2);

    let sh=parseFloat(saat.innerText)||0;

    toplam+=dersOrt*sh;
    saatToplam+=sh;
  });

  document.getElementById("genel").innerText=
    saatToplam>0 ? (toplam/saatToplam).toFixed(2) : "0";
}

hesapla();
</script>
